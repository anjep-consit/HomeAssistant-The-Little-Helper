  - id: morning_pill_reminder_with_escalation
    alias: "Morgenpiller - pÃ¥mindelse med eskalering"
    mode: restart
    trigger:
      - platform: time
        at: input_datetime.morning_pill_time
    condition:
      - condition: state
        entity_id: input_boolean.morning_pills_taken
        state: "off"
    action:
      - repeat:
          while:
            - condition: state
              entity_id: input_boolean.morning_pills_taken
              state: "off"
          sequence:
            - service: script.the_little_helper_notify
              data:
                title: "Morgenpiller ðŸ’Š"
                message: "pillerne venter pÃ¥ dig. Tryk Taget, nÃ¥r de er klaret."
                tag: morning_pills
                actions:
                  - action: MORNING_PILLS_TAKEN
                    title: Taget
                  - action: MORNING_PILLS_SNOOZE
                    title: Snooze 10 min
            - delay: "00:10:00"
            - if:
                - condition: state
                  entity_id: input_boolean.morning_pills_taken
                  state: "off"
              then:
                - service: script.the_little_helper_speak
                  data:
                    message: "Hov, morgenpillerne venter stadig pÃ¥ dig."
  - id: evening_pill_reminder_with_escalation
    alias: "Aftenpiller - pÃ¥mindelse med eskalering"
    mode: restart
    trigger:
      - platform: time
        at: input_datetime.evening_pill_time
    condition:
      - condition: state
        entity_id: input_boolean.evening_pills_taken
        state: "off"
    action:
      - repeat:
          while:
            - condition: state
              entity_id: input_boolean.evening_pills_taken
              state: "off"
          sequence:
            - service: script.the_little_helper_notify
              data:
                title: "Aftenpiller ðŸ’Š"
                message: "aftenpillerne venter stille og roligt pÃ¥ dig."
                tag: evening_pills
                actions:
                  - action: EVENING_PILLS_TAKEN
                    title: Taget
                  - action: EVENING_PILLS_SNOOZE
                    title: Snooze 10 min
            - delay: "00:10:00"
            - if:
                - condition: state
                  entity_id: input_boolean.evening_pills_taken
                  state: "off"
              then:
                - service: script.the_little_helper_speak
                  data:
                    message: "Hov, aftenpillerne venter stadig pÃ¥ dig."
  - id: pill_notification_actions
    alias: "Piller - hÃ¥ndter notifikationsknapper"
    mode: parallel
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
    action:
      - choose:
          - conditions: "{{ trigger.event.data.action == 'MORNING_PILLS_TAKEN' }}"
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id:
                    - input_boolean.morning_pills_taken
