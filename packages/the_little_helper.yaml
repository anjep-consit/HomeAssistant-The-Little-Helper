        state: >
          {% set morning = states('input_number.mood_morning') | int(0) %}
          {% set evening = states('input_number.mood_evening') | int(0) %}
          {% if morning > 0 and evening > 0 %}{{ evening - morning }}{% else %}unknown{% endif %}
      - name: The Little Helper Mood
        unique_id: the_little_helper_mood
        icon: mdi:paperclip
        state: >
          {% set hour = now().hour %}
          {% set mood = states('input_number.mood_morning') | int(0) %}
          {% set pending = is_state('input_boolean.morning_pills_taken','off') or is_state('input_boolean.evening_pills_taken','off') %}
          {% set milestone = states('counter.pill_streak_days') | int(0) in [7,30,100] %}
          {% if hour < 6 %}mascot_sleeping.png{% elif mood > 0 and mood < 4 %}mascot_comfort.png{% elif milestone %}mascot_celebrate.png{% elif pending %}mascot_thinking.png{% else %}mascot_idle.png{% endif %}
      - name: The Little Helper Greeting
        unique_id: the_little_helper_greeting
        icon: mdi:message-text
        state: >
          {% set greetings = ['Hej Anders, Den Lille HjÃ¦lper her', 'Lille reminder fra mig', 'Det ser ud som om du er ved at bygge en god dag', 'Tjekker lige ind', 'Klar til en lille ting?'] %}
          {{ greetings[now().day % (greetings | count)] }}
      - name: The Little Helper Daily Tip
        unique_id: the_little_helper_daily_tip
        icon: mdi:lightbulb-on
        state: >
          {% set tips = ['LÃ¦g pillerne synligt ved noget, du allerede gÃ¸r hver morgen.', 'En kort gÃ¥tur tÃ¦ller ogsÃ¥. Vi gÃ¥r efter retning, ikke perfektion.', 'Start timeren fÃ¸r motivationen dukker op.', 'Pak tasken i aften, sÃ¥ i morgen bliver lettere.', 'Drik et glas vand, fÃ¸r nÃ¦ste opgave.', 'SÃ¦t skoene frem, hvis skridtene skal have et lille skub.', 'GÃ¸r nÃ¦ste handling sÃ¥ lille, at den nÃ¦sten fÃ¸les dum.', 'Brug pause-timeren som en aftale med kroppen.', 'Lav Ã©n ting fÃ¦rdig fÃ¸r du Ã¥bner nÃ¦ste fane.', 'Et lavt humÃ¸r-tal er data, ikke en dom.', 'Hvis dagen vÃ¦lter, sÃ¥ vÃ¦lg Ã©n anker-rutine.', 'Morgenmad behÃ¸ver ikke vÃ¦re perfekt for at tÃ¦lle.', 'NÃ¸gler samme sted hver dag sparer fremtidig energi.', 'En trÃ¦ning pÃ¥ 30 minutter er en rigtig trÃ¦ning.', 'Tjek kalenderen fÃ¸r aftensluk, ikke efter sengetid.', 'Skriv noten mens fÃ¸lelsen er frisk.', 'Gentagelser bygger systemet, ikke karakter.', 'SÃ¦t lyd pÃ¥ vigtige pÃ¥mindelser, nÃ¥r dagen er tung.', 'Fejr streaks, men start roligt igen nÃ¥r de knÃ¦kker.', 'Vi tager nÃ¦ste lille skridt sammen.'] %}
