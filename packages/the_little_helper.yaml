template:
  - sensor:
      - name: Daily Steps
        unique_id: daily_steps
        unit_of_measurement: skridt
        icon: mdi:shoe-print
        state: "{{ states('sensor.anders_phone_steps') | int(0) }}"
      - name: Morning Routine Completion
        unique_id: morning_routine_completion
        unit_of_measurement: "%"
        icon: mdi:clipboard-check
        state: >
          {% set items = [
            is_state('input_boolean.morning_routine_teeth','on'),
            is_state('input_boolean.morning_routine_breakfast','on'),
            is_state('input_boolean.morning_routine_keys','on'),
            is_state('input_boolean.morning_routine_lunchbox','on'),
            is_state('input_boolean.morning_routine_meds','on')
          ] %}
          {{ ((items | select('equalto', true) | list | count) / (items | count) * 100) | round(0) }}
      - name: Evening Routine Completion
        unique_id: evening_routine_completion
        unit_of_measurement: "%"
        icon: mdi:clipboard-check-outline
        state: >
          {% set items = [
            is_state('input_boolean.evening_routine_teeth','on'),
            is_state('input_boolean.evening_routine_prep_tomorrow','on'),
            is_state('input_boolean.evening_routine_phone_charging','on'),
            is_state('input_boolean.evening_routine_meds','on')
          ] %}
          {{ ((items | select('equalto', true) | list | count) / (items | count) * 100) | round(0) }}
      - name: Workout Weekly Status
        unique_id: workout_weekly_status
        icon: mdi:dumbbell
        state: "{{ states('counter.workouts_this_week') | int(0) }} / {{ states('input_number.weekly_workout_goal') | int(3) }} denne uge"
      - name: Blood Pressure Status
        unique_id: blood_pressure_status
        icon: mdi:heart-pulse
        state: >
          {% set sys = states('sensor.withings_systolic_blood_pressure_anders') | int(0) %}
          {% set dia = states('sensor.withings_diastolic_blood_pressure_anders') | int(0) %}
          {% if sys >= 140 or dia >= 90 %}RÃ¸d{% elif sys >= 130 or dia >= 85 %}Gul{% elif sys > 0 and dia > 0 %}GrÃ¸n{% else %}Ukendt{% endif %}
      - name: Mood Delta Today
