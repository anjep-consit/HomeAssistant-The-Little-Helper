  - id: mood_notification_actions
    alias: "Humør - håndter notifikationsknapper"
    mode: parallel
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
    action:
      - variables:
          action_name: "{{ trigger.event.data.action | default('') }}"
      - choose:
          - conditions: "{{ action_name.startswith('MOOD_MORNING_') }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.mood_morning
                data:
                  value: "{{ action_name.split('_')[-1] | int }}"
          - conditions: "{{ action_name.startswith('MOOD_EVENING_') }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.mood_evening
                data:
                  value: "{{ action_name.split('_')[-1] | int }}"
