  - id: mascot_easter_egg
    alias: "Den Lille Hjælper - maskot easter egg"
    mode: restart
    trigger:
      - platform: state
        entity_id: input_button.the_little_helper_mascot_tap
    action:
      - service: counter.increment
        target:
          entity_id: counter.the_little_helper_mascot_taps
      - delay: "00:00:05"
      - if:
          - condition: template
            value_template: "{{ states('counter.the_little_helper_mascot_taps') | int(0) >= 3 }}"
        then:
          - service: script.the_little_helper_notify
            data:
              title: "Du fandt mig 📎"
              message: "det tæller som en lille sejr. Videre med ro på."
              tag: helper_easter_egg
      - service: counter.reset
        target:
          entity_id: counter.the_little_helper_mascot_taps


