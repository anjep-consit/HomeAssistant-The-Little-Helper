          - conditions: "{{ trigger.event.data.action == 'EVENING_PILLS_TAKEN' }}"
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id:
                    - input_boolean.evening_pills_taken
                    - input_boolean.evening_routine_meds
  - id: evaluate_daily_streaks
    alias: "Evaluer daglige streaks"
    mode: single
    trigger:
      - platform: time
        at: "23:55:00"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.morning_pills_taken
                state: "on"
              - condition: state
                entity_id: input_boolean.evening_pills_taken
                state: "on"
            sequence:
              - service: counter.increment
                target:
                  entity_id: counter.pill_streak_days
        default:
